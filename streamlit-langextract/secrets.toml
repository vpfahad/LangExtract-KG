# .streamlit/secrets.toml
# Fill in your Azure OpenAI details here so the app loads them automatically.
# Alternatively you can paste them into the sidebar text boxes at runtime.

AZURE_OPENAI_API_KEY         = "your-azure-openai-api-key-here"
AZURE_OPENAI_ENDPOINT        = "https://YOUR-RESOURCE-NAME.openai.azure.com/"
AZURE_OPENAI_DEPLOYMENT_NAME = "gpt-4o"           # your deployment name in Azure AI Studio
AZURE_OPENAI_API_VERSION     = "2024-12-01-preview"
